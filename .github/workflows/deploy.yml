name: Build and Deploy

on:
  push:
    branches: [master]

jobs:
  build:
    uses: adarshraj/platform/.github/workflows/quarkus-build.yml@main
    with:
      image-name: ai-shim
    secrets: inherit

  deploy:
    needs: build
    uses: adarshraj/platform/.github/workflows/deploy-portainer.yml@main
    with:
      stack-name: ai-shim
    secrets: inherit

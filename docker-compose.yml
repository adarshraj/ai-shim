services:

  # ── AI Shim (Quarkus) ────────────────────────────────────────────────────────
  ai-shim:
    image: ghcr.io/adarshraj/ai-shim:latest
    container_name: ai-shim
    restart: unless-stopped
    expose:
      - "8090"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 1g
    cpus: 1.0
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai-shim.rule=Host(`${AI_SHIM_HOST:-aishim.homelab.local}`)"
      - "traefik.http.routers.ai-shim.entrypoints=websecure"
      - "traefik.http.routers.ai-shim.tls=true"
      - "traefik.http.services.ai-shim.loadbalancer.server.port=8090"
      - "traefik.http.routers.ai-shim.middlewares=ratelimit@docker,secure-headers@docker"
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://localhost:8703}
      # AI provider keys — set only the ones you use; unset keys default to DISABLED
      OPENAI_API_KEY: ${OPENAI_API_KEY:-DISABLED}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-DISABLED}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-DISABLED}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-DISABLED}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-DISABLED}
      AZURE_OPENAI_RESOURCE_NAME: ${AZURE_OPENAI_RESOURCE_NAME:-placeholder}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      # Free-tier provider keys (optional — can also be supplied per-request)
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      COHERE_API_KEY: ${COHERE_API_KEY:-}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      GITHUB_MODELS_API_KEY: ${GITHUB_MODELS_API_KEY:-}
      NVIDIA_NIM_API_KEY: ${NVIDIA_NIM_API_KEY:-}
      OVHCLOUD_AI_ENDPOINTS_API_KEY: ${OVHCLOUD_AI_ENDPOINTS_API_KEY:-}
      LLM7_API_KEY: ${LLM7_API_KEY:-}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      # Model overrides
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GEMINI_VISION_MODEL: ${GEMINI_VISION_MODEL:-gemini-2.0-flash}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      # Ollama (local or cloud — uses OpenAI-compatible API, no extra dependency)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      OLLAMA_VISION_MODEL: ${OLLAMA_VISION_MODEL:-llava}
      OLLAMA_TEXT_MODEL: ${OLLAMA_TEXT_MODEL:-llama3.2}
      # CORS — set to the origin of your calling app
      AI_SHIM_ALLOWED_ORIGIN: ${AI_SHIM_ALLOWED_ORIGIN:-http://localhost:5173}
      # Limits
      AI_SHIM_MAX_UPLOAD_BYTES: ${AI_SHIM_MAX_UPLOAD_BYTES:-20971520}
      AI_SHIM_MAX_BODY_SIZE: ${AI_SHIM_MAX_BODY_SIZE:-50M}
      AI_SHIM_MAX_PROMPT_CHARS: ${AI_SHIM_MAX_PROMPT_CHARS:-200000}
      # Rate limiting
      AI_SHIM_RATE_LIMIT_RPM: ${AI_SHIM_RATE_LIMIT_RPM:-30}
      AI_SHIM_RATE_LIMIT_RPD: ${AI_SHIM_RATE_LIMIT_RPD:-1000}
    networks:
      - platform_proxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/q/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  platform_proxy:
    external: true
